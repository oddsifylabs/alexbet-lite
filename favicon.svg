<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d68f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4d9fff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#0a0e27"/>
  
  <!-- Gradient circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  
  <!-- Lightning bolt -->
  <path d="M 256 100 L 340 220 L 280 220 L 340 380 L 180 280 L 240 280 Z" fill="#0a0e27" stroke="#fff" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Letter A -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="#fff" text-anchor="middle" dominant-baseline="middle" opacity="0.3">A</text>
</svg>