[build]
  publish = "."
  command = ""
  base = "."

# SPA redirect - route all URLs to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Production environment
[context.production]
  environment = { NODE_ENV = "production" }

# Enable HTTPS (automatic)
[build.processing]
  skip_processing = false
